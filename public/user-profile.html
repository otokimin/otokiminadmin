<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kullanıcı Profili</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #10b981;
      --text: #f1f5f9;
      --muted: #64748b;
      --card: #141d2e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LOGO / BRAND */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* PROFILE CARD */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1rem;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .profile-email {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.15rem;
    }

    .badge-verified {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(16,185,129,0.12);
      color: #10b981;
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    /* CARS */
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      margin-top: 1.25rem;
    }

    .car-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .car-plate {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .car-meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.15rem;
    }
    .car-default {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      letter-spacing: 0.04em;
    }

    .no-car {
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
      padding: 1rem 0;
    }

    /* APP BUTTONS */
    .app-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      color: #fff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: -0.01em;
    }
    .app-btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }
    .app-btn:active { transform: scale(0.98); }

    .btn-ios {
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      border: 1px solid #3a3a3c;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .btn-ios:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

    .btn-android {
      background: linear-gradient(135deg, #0d7a4e, #10b981);
      box-shadow: 0 4px 20px rgba(16,185,129,0.25);
    }
    .btn-android:hover { box-shadow: 0 8px 30px rgba(16,185,129,0.35); }

    .btn-icon {
      width: 28px;
      height: 28px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 2rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-name">OtoKimin</div>
      <div class="brand-sub">Kullanıcı Profili</div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-header">
        <div>
          <div class="profile-name" id="userName">—</div>
          <div class="profile-email" id="userEmail">—</div>
          <div class="profile-phone" id="userPhone" style="color: var(--muted); font-size: 0.95rem; margin-top: 0.25rem;"></div>
        </div>
      </div>
    </div>

    <!-- App Buttons -->
    <div class="app-buttons">
      <button id="chatBtn" class="app-btn" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: #fff;">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l1.65-4.77A8.94 8.94 0 013 12C3 6.48 7.92 2 13.5 2S24 6.48 24 12s-4.92 10-10.5 10c-1.61 0-3.14-.31-4.54-.88L2 21z"/></svg>
        Sohbet Et
      </button>
      <a href="https://play.google.com/store/apps/details?id=com.otokimin" class="app-btn btn-android" target="_blank">
        <!-- Play Icon -->
        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.18 23.76a2 2 0 001.94-.21l12.19-7.07-2.89-2.89L3.18 23.76zM20.43 10.3L17.6 8.69l-3.22 3.22 3.22 3.21 2.87-1.66a1.74 1.74 0 000-3.16zM1.6.5A1.72 1.72 0 001 1.86v20.28a1.72 1.72 0 00.6 1.36l.07.07 11.37-11.37v-.27L1.67.43zm9.96 10.24L3.12.26l.06-.05 11.37 6.52-3.03 4.01z"/>
        </svg>
        Google Play'den İndir
      </a>
    </div>

    <div class="footer-note">
      Bu sayfa OtoKimin uygulamasına ait QR koddan açılmıştır.<br/>
      Uygulamayı indirerek araçlarınızı yönetebilirsiniz.
    </div>
  </div>

  <script>
    // URL'den parametreleri oku
    const params = new URLSearchParams(window.location.search);
    const uid   = params.get("uid") || "";
    const name  = params.get("name") || "Bilinmeyen Kullanıcı";
    const email = params.get("email") || "";
    const phone = params.get("phone") || "";

    // Profil bilgileri
    document.getElementById("userName").textContent  = name;
    document.getElementById("userEmail").textContent = email;
    if (phone) {
      document.getElementById("userPhone").textContent = phone;
    }
    // Sohbet Et butonu — uygulama içi chat ekranına yönlendir
    document.getElementById("chatBtn").addEventListener("click", function() {
      // Sadece Android uygulama deep linki: intent://chat?uid=...&name=...#Intent;scheme=otokimin;package=com.otokimin;end
      if (uid) {
        window.location.href = `intent://chat?uid=${encodeURIComponent(uid)}&name=${encodeURIComponent(name)}#Intent;scheme=otokimin;package=com.otokimin;end`;
      } else {
        alert("Kullanıcı bulunamadı.");
      }
    });

    // Araç bilgisi gösterilmeyecek, alanı temizle
    document.getElementById("carList").innerHTML = "";
  </script>
</body>
</html>
